services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhipet
      POSTGRES_USER: zhipet
      POSTGRES_PASSWORD: zhipet_dev
    ports:
      - "5432:5432"
    volumes:
      - zhipet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhipet -d zhipet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zhipet_postgres_data:
